<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ömer - EyeTrack Portre</title>
  <style>
    body { 
      margin: 0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      background-color: transparent; 
      overflow: hidden;
    }
    .portrait-container { 
      position: relative; 
      width: 300px; 
      height: 300px; 
      border-radius: 50%; 
      overflow: hidden; 
      background-color: #ffffff;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .portrait-image { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      /* Güncellenmiş doğru repo yolu: */
      background-image: url('https://raw.githubusercontent.com/orakomer33-jpg/omer-eye-track/main/avatar.jpg'); 
      background-size: cover; 
      background-position: center; 
      position: absolute; 
      z-index: 1; 
    }
    .eye-mask { 
      position: absolute; 
      top: 33.5%; 
      width: 24px; 
      height: 6px; 
      z-index: 2; 
    }
    .eye-mask.left { left: 37.8%; }
    .eye-mask.right { right: 37.2%; }
    .pupil { 
      position: absolute; 
      top: 50%; 
      left: 50%; 
      width: 10px; 
      height: 10px; 
      background-color: #2b1a13; 
      border-radius: 50%; 
      transition: transform 0.05s ease-out; 
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

<div class="portrait-container">
  <div class="portrait-image"></div>
  <div class="eye-mask left" id="left-eye"><div class="pupil" id="left-pupil"></div></div>
  <div class="eye-mask right" id="right-eye"><div class="pupil" id="right-pupil"></div></div>
</div>

<script>
  const leftPupil = document.getElementById('left-pupil');
  const rightPupil = document.getElementById('right-pupil');

  document.addEventListener('mousemove', (e) => {
    movePupil(leftPupil, e.clientX, e.clientY);
    movePupil(rightPupil, e.clientX, e.clientY);
  });

  function movePupil(pupil, mouseX, mouseY) {
    const rect = pupil.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    const angle = Math.atan2(mouseY - centerY, mouseX - centerX);
    const dist = Math.min(5, Math.sqrt(Math.pow(mouseX - centerX, 2) + Math.pow(mouseY - centerY, 2)) * 0.1);
    
    pupil.style.transform = `translate(calc(-50% + ${Math.cos(angle) * dist}px), calc(-50% + ${Math.sin(angle) * dist}px))`;
  }
</script>
</body>
</html>
